<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Analyzer – Microsoft 365 Impact Analyse Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --dark: #0f172a;
  --accent: #0078d4;
  --accent-hover: #106ebe;
  --green: #107c10;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --input-bg: #f8fafc;
  --tag: #eff6ff;
  --tag-text: #1d4ed8;
}

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ─────────────────────────────────────── */
.topbar {
  background: var(--dark);
  height: 50px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.topbar-logo {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: white; letter-spacing: -0.5px;
}

.topbar-name { font-size: 15px; font-weight: 600; color: #fff; }
.topbar-sep { color: rgba(255,255,255,0.2); font-size: 18px; }
.topbar-sub { font-size: 12px; color: rgba(255,255,255,0.45); }

/* ── LAYOUT ─────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── INPUT PANEL ─────────────────────────────────── */
.panel-in {
  width: 380px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}

.panel-label {
  padding: 13px 18px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-body {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}

label.lbl {
  display: block;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--muted); margin-bottom: 5px;
}

input[type="password"], textarea {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px; color: var(--text);
  background: var(--input-bg);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input[type="password"]:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,120,212,0.1);
  background: #fff;
}

input[type="password"] { font-family: 'Consolas', monospace; letter-spacing: 1px; }

textarea { resize: none; height: 290px; line-height: 1.55; }

.hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

.btn-go {
  width: 100%; padding: 10px 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-go:hover:not(:disabled) { background: var(--accent-hover); }
.btn-go:active:not(:disabled) { transform: scale(0.98); }
.btn-go:disabled { opacity: 0.55; cursor: not-allowed; }

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── OUTPUT PANEL ────────────────────────────────── */
.panel-out {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

.out-toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 9px 18px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

.out-toolbar-left { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }

.btn-dl {
  padding: 7px 16px;
  background: var(--green); color: #fff;
  border: none; border-radius: 6px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-dl:hover:not(:disabled) { opacity: 0.88; }
.btn-dl:disabled { opacity: 0.35; cursor: not-allowed; }

.out-scroll { flex: 1; overflow-y: auto; padding: 24px; }

/* ── EMPTY STATE ─────────────────────────────────── */
.empty {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
}
.empty-icon {
  width: 64px; height: 64px;
  background: var(--border); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.empty-t { font-size: 15px; font-weight: 500; color: var(--muted); }
.empty-s { font-size: 13px; color: #cbd5e1; }

/* ── PREVIEW CARD ────────────────────────────────── */
.preview-card {
  background: #fff; border-radius: 8px;
  border: 1px solid var(--border);
  padding: 28px 32px; max-width: 740px; margin: 0 auto;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.p-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  padding-bottom: 14px; margin-bottom: 18px;
  border-bottom: 2px solid var(--accent);
}

.p-section { margin-bottom: 16px; }

.p-label {
  font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px;
}

.p-value {
  font-size: 13px; color: var(--text); line-height: 1.65;
}
.p-value a { color: var(--accent); text-decoration: none; }
.p-value a:hover { text-decoration: underline; }

.p-bullets { list-style: disc; padding-left: 18px; margin: 6px 0; }
.p-bullets li { font-size: 13px; line-height: 1.65; margin-bottom: 3px; }

.p-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

.no-learn-note {
  font-size: 12px; color: var(--muted);
  font-style: italic; margin-bottom: 8px;
}

/* ── ERROR BOX ───────────────────────────────────── */
.err-box {
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 8px; padding: 14px 16px;
  color: #dc2626; font-size: 13px; line-height: 1.5;
  max-width: 740px; margin: 0 auto;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">MC</div>
  <div class="topbar-name">MC Analyzer</div>
  <div class="topbar-sep">|</div>
  <div class="topbar-sub">Microsoft 365 Message Center – Impact Analyse Tool</div>
</div>

<div class="main">

  <!-- ── INPUT PANEL ── -->
  <div class="panel-in">
    <div class="panel-label">Invoer</div>
    <div class="panel-body">

      <div>
        <label class="lbl">Claude API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
        <p class="hint">Wordt opgeslagen in je browser (localStorage)</p>
      </div>

      <div style="flex:1;">
        <label class="lbl">Message Center item</label>
        <textarea id="mcText" placeholder="Plak hier de volledige tekst van het Microsoft Message Center item...

Message ID: MC1234567
Published date: ...
Category: ...
..."></textarea>
      </div>

      <button class="btn-go" id="analyzeBtn" onclick="analyze()">
        <span id="btnLabel">▶ Analyseer item</span>
      </button>

    </div>
  </div>

  <!-- ── OUTPUT PANEL ── -->
  <div class="panel-out">
    <div class="out-toolbar">
      <span class="out-toolbar-left">Preview analyse</span>
      <button class="btn-dl" id="dlBtn" disabled onclick="downloadDocx()">
        ↓ Download .docx
      </button>
    </div>
    <div class="out-scroll">
      <div class="empty" id="emptyState">
        <div class="empty-icon">📋</div>
        <div class="empty-t">Plak een MC item en klik op Analyseer</div>
        <div class="empty-s">De analyse verschijnt hier als voorbeeld</div>
      </div>
      <div id="previewArea" style="display:none;"></div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let currentAnalysis = null;

// Load saved API key
window.addEventListener('load', () => {
  const saved = localStorage.getItem('mc_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
});

document.getElementById('apiKey').addEventListener('change', e => {
  localStorage.setItem('mc_api_key', e.target.value.trim());
});

// ─────────────────────────────────────────────────────────────────────────────
// System prompt for Claude
// ─────────────────────────────────────────────────────────────────────────────
const SYSTEM = `Je bent een senior Microsoft 365 / Modern Workplace engineer die Message Center items analyseert voor een enterprise organisatie.

Analyseer het gegeven Microsoft Message Center item en genereer een volledige impactanalyse.

KRITISCHE REGELS:
- Schrijf ALTIJD in het Nederlands
- Gebruik menselijke, natuurlijke taal - geen robotstijl
- Gebruik NOOIT het em-dash teken (—), gebruik een komma of dubbele punt
- Gebruik NOOIT "ten eerste, ten tweede" etc. - gebruik bulletpoints (array items)
- De omschrijving beschrijft de wijziging volledig en begrijpelijk, GEEN risico of impact daarin
- Zet geenSpecifiekeLearnPagina op true als er geen exacte Microsoft Learn-pagina bestaat voor de specifieke feature
- Geef ALLEEN pure JSON terug - geen markdown, geen backticks, geen uitleg, alleen de JSON

Formaat:
{
  "mcId": "MC1234567",
  "title": "[Platform] Beschrijvende titel [MC1234567]",
  "platform": "Microsoft platform of product naam",
  "roadmapId": "558434 of null als niet van toepassing",
  "roadmapUrl": "https://www.microsoft.com/microsoft-365/roadmap?filters=&searchterms=558434 of https://www.microsoft.com/microsoft-365/roadmap",
  "plannerTask": "[Platform] Beschrijvende titel [MC1234567]",
  "planning": ["Targeted Release: uitrol begin april 2026, afgerond medio april 2026", "Algemeen beschikbaar (wereldwijd): uitrol medio april 2026, afgerond eind april 2026"],
  "omschrijvingIntro": "Openingsparagraaf die volledig en begrijpelijk uitlegt wat de wijziging is, wat het doet en voor wie.",
  "omschrijvingBullets": ["Eerste concrete punt met detail", "Tweede concrete punt met detail"],
  "omschrijvingSlot": "Afsluitende zin over licenties of vereisten. Lege string als niet van toepassing.",
  "impactOrganisaties": "laag/gemiddeld/hoog - korte toelichting",
  "impactTechnisch": "toelichting technische impact",
  "impactFunctioneel": "toelichting functionele impact voor gebruikers",
  "impactBeheer": ["Actie of aandachtspunt 1", "Actie of aandachtspunt 2"],
  "links": [
    {"label": "Microsoft Learn - Beschrijvende naam", "url": "https://learn.microsoft.com/..."},
    {"label": "Microsoft Message Center - MC1234567", "url": null}
  ],
  "geenSpecifiekeLearnPagina": false
}`;

// ─────────────────────────────────────────────────────────────────────────────
// Analyze
// ─────────────────────────────────────────────────────────────────────────────
async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const mcText = document.getElementById('mcText').value.trim();

  if (!apiKey) { alert('Vul eerst je Claude API key in.'); return; }
  if (!mcText) { alert('Plak eerst een Message Center item.'); return; }

  localStorage.setItem('mc_api_key', apiKey);

  // Loading UI
  const btn = document.getElementById('analyzeBtn');
  const lbl = document.getElementById('btnLabel');
  btn.disabled = true;
  lbl.innerHTML = '<div class="spinner"></div>&nbsp;Analyseren...';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('dlBtn').disabled = true;
  currentAnalysis = null;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        system: SYSTEM,
        messages: [{ role: 'user', content: mcText }]
      })
    });

    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e.error?.message || `API fout ${resp.status}: ${resp.statusText}`);
    }

    const data = await resp.json();
    let raw = data.content[0].text.trim();

    // Strip accidental markdown fences
    if (raw.startsWith('```')) {
      raw = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
    }

    currentAnalysis = JSON.parse(raw);
    renderPreview(currentAnalysis);
    document.getElementById('dlBtn').disabled = false;

  } catch (err) {
    document.getElementById('previewArea').innerHTML =
      `<div class="err-box"><strong>Fout:</strong> ${err.message}</div>`;
    document.getElementById('previewArea').style.display = 'block';
  } finally {
    btn.disabled = false;
    lbl.textContent = '▶ Analyseer item';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Render preview
// ─────────────────────────────────────────────────────────────────────────────
function renderPreview(a) {
  const area = document.getElementById('previewArea');

  const planningLines = Array.isArray(a.planning) ? a.planning : [a.planning];
  const planningHtml = planningLines.join('<br>');

  const bulletsHtml = (a.omschrijvingBullets && a.omschrijvingBullets.length)
    ? `<ul class="p-bullets">${a.omschrijvingBullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`
    : '';

  const beheerHtml = Array.isArray(a.impactBeheer)
    ? `<ul class="p-bullets">${a.impactBeheer.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`
    : `<span>${esc(a.impactBeheer)}</span>`;

  let linksHtml = '';
  if (a.geenSpecifiekeLearnPagina) {
    linksHtml += `<p class="no-learn-note">Geen specifieke Microsoft Learn-pagina voor deze update gevonden. Hieronder de meest relevante officiële bronnen.</p>`;
  }
  a.links.forEach(l => {
    linksHtml += `<div style="margin-bottom:8px;">
      <strong style="font-size:13px;">${esc(l.label)}:</strong><br>
      ${l.url ? `<a href="${l.url}" target="_blank" style="font-size:13px;">${esc(l.url)}</a>` : `<span style="font-size:13px;color:var(--muted);">Microsoft Message Center</span>`}
    </div>`;
  });

  area.innerHTML = `
    <div class="preview-card">
      <div class="p-title">${esc(a.title)}</div>

      <div class="p-section">
        <div class="p-label">Platform:</div>
        <div class="p-value">${esc(a.platform)}</div>
      </div>

      <div class="p-section">
        <div class="p-label">Link naar Microsoft (Roadmap ID + URL):</div>
        <div class="p-value">
          Roadmap ID: ${esc(a.roadmapId || 'niet van toepassing')}<br>
          <a href="${a.roadmapUrl}" target="_blank">${esc(a.roadmapUrl)}</a>
        </div>
      </div>

      <div class="p-section">
        <div class="p-label">Link naar Teams taak:</div>
        <div class="p-value">Planner - ${esc(a.plannerTask)}</div>
      </div>

      <div class="p-section">
        <div class="p-label">Planning:</div>
        <div class="p-value">${planningHtml}</div>
      </div>

      <hr class="p-divider">

      <div class="p-section">
        <div class="p-label">Omschrijving wijziging:</div>
        <div class="p-value">${esc(a.omschrijvingIntro)}</div>
        ${bulletsHtml}
        ${a.omschrijvingSlot ? `<div class="p-value" style="margin-top:8px;">${esc(a.omschrijvingSlot)}</div>` : ''}
      </div>

      <hr class="p-divider">

      <div class="p-section">
        <div class="p-label">Impactanalyse:</div>
        <div class="p-value">
          <strong>Impact voor organisaties:</strong> ${esc(a.impactOrganisaties)}<br><br>
          <strong>Technische impact:</strong> ${esc(a.impactTechnisch)}<br><br>
          <strong>Functionele impact:</strong> ${esc(a.impactFunctioneel)}<br><br>
          <strong>Wijzigingen in beheer of gedrag:</strong>
          ${beheerHtml}
        </div>
      </div>

      <hr class="p-divider">

      <div class="p-section">
        <div class="p-label">Links:</div>
        <div class="p-value">${linksHtml}</div>
      </div>
    </div>`;

  area.style.display = 'block';
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// DOCX Generation
// ─────────────────────────────────────────────────────────────────────────────

function xEsc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function boldPara(text) {
  return `<w:p><w:r><w:rPr><w:b/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t xml:space="preserve">${xEsc(text)}</w:t></w:r></w:p>`;
}

function normalPara(text) {
  if (!text) return '<w:p/>';
  return `<w:p><w:r><w:rPr><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t xml:space="preserve">${xEsc(text)}</w:t></w:r></w:p>`;
}

function labelValPara(label, value) {
  return `<w:p>
    <w:r><w:rPr><w:b/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t xml:space="preserve">${xEsc(label)}</w:t></w:r>
    <w:r><w:rPr><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t xml:space="preserve">${xEsc(value)}</w:t></w:r>
  </w:p>`;
}

function bulletPara(text) {
  return `<w:p>
    <w:pPr><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr></w:pPr>
    <w:r><w:rPr><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t xml:space="preserve">${xEsc(text)}</w:t></w:r>
  </w:p>`;
}

function hyperlinkPara(text, rId) {
  return `<w:p>
    <w:hyperlink r:id="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
      <w:r><w:rPr><w:rStyle w:val="Hyperlink"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t>${xEsc(text)}</w:t></w:r>
    </w:hyperlink>
  </w:p>`;
}

async function downloadDocx() {
  if (!currentAnalysis) return;
  const a = currentAnalysis;

  // Build hyperlink index (rId1=styles, rId2=numbering, rId3+ = hyperlinks)
  const hlMap = new Map(); // url -> rId
  let rIdCtr = 3;

  function getOrAddHl(url) {
    if (!url) return null;
    if (!hlMap.has(url)) {
      hlMap.set(url, `rId${rIdCtr++}`);
    }
    return hlMap.get(url);
  }

  // Pre-register all URLs
  getOrAddHl(a.roadmapUrl);
  a.links.forEach(l => { if (l.url) getOrAddHl(l.url); });

  // Build paragraph array
  const paras = [];

  // Title
  paras.push(boldPara(a.title));
  paras.push('<w:p/>');

  // Platform
  paras.push(boldPara('Platform:'));
  paras.push(normalPara(a.platform));
  paras.push('<w:p/>');

  // Roadmap
  paras.push(boldPara('Link naar Microsoft (Roadmap ID + URL):'));
  paras.push(normalPara(`Roadmap ID: ${a.roadmapId || 'niet van toepassing'}`));
  if (a.roadmapUrl) {
    const rId = getOrAddHl(a.roadmapUrl);
    paras.push(hyperlinkPara(a.roadmapUrl, rId));
  }
  paras.push('<w:p/>');

  // Planner
  paras.push(boldPara('Link naar Teams taak:'));
  paras.push(normalPara(`Planner - ${a.plannerTask}`));
  paras.push('<w:p/>');

  // Planning
  paras.push(boldPara('Planning:'));
  const planLines = Array.isArray(a.planning) ? a.planning : [a.planning];
  planLines.forEach(l => paras.push(normalPara(l)));
  paras.push('<w:p/>');

  // Omschrijving
  paras.push(boldPara('Omschrijving wijziging:'));
  if (a.omschrijvingIntro) paras.push(normalPara(a.omschrijvingIntro));
  if (a.omschrijvingBullets && a.omschrijvingBullets.length) {
    paras.push('<w:p/>');
    a.omschrijvingBullets.forEach(b => paras.push(bulletPara(b)));
  }
  if (a.omschrijvingSlot) {
    paras.push('<w:p/>');
    paras.push(normalPara(a.omschrijvingSlot));
  }
  paras.push('<w:p/>');

  // Impactanalyse
  paras.push(boldPara('Impactanalyse:'));
  paras.push(labelValPara('Impact voor organisaties: ', a.impactOrganisaties));
  paras.push(labelValPara('Technische impact: ', a.impactTechnisch));
  paras.push(labelValPara('Functionele impact: ', a.impactFunctioneel));
  paras.push(boldPara('Wijzigingen in beheer of gedrag:'));
  if (Array.isArray(a.impactBeheer)) {
    a.impactBeheer.forEach(b => paras.push(bulletPara(b)));
  } else {
    paras.push(normalPara(a.impactBeheer));
  }
  paras.push('<w:p/>');

  // Links
  paras.push(boldPara('Links:'));
  if (a.geenSpecifiekeLearnPagina) {
    paras.push(normalPara('Geen specifieke Microsoft Learn-pagina voor deze update gevonden. Hieronder de meest relevante officiële bronnen.'));
    paras.push('<w:p/>');
  }
  a.links.forEach(l => {
    paras.push(boldPara(l.label + ':'));
    if (l.url) {
      const rId = getOrAddHl(l.url);
      paras.push(hyperlinkPara(l.url, rId));
    } else {
      paras.push(normalPara('Microsoft Message Center'));
    }
    paras.push('<w:p/>');
  });

  // Build relationships XML
  let hlRels = '';
  hlMap.forEach((rId, url) => {
    hlRels += `  <Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/hyperlink" Target="${xEsc(url)}" TargetMode="External"/>\n`;
  });

  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>
${hlRels}</Relationships>`;

  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">
  <w:body>
    ${paras.join('\n    ')}
    <w:sectPr>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/>
    </w:sectPr>
  </w:body>
</w:document>`;

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults>
    <w:rPrDefault>
      <w:rPr>
        <w:rFonts w:ascii="Calibri" w:hAnsi="Calibri" w:cs="Calibri"/>
        <w:sz w:val="22"/><w:szCs w:val="22"/>
        <w:lang w:val="nl-NL"/>
      </w:rPr>
    </w:rPrDefault>
  </w:docDefaults>
  <w:style w:type="character" w:styleId="Hyperlink">
    <w:name w:val="Hyperlink"/>
    <w:rPr>
      <w:color w:val="0563C1"/>
      <w:u w:val="single"/>
    </w:rPr>
  </w:style>
</w:styles>`;

  const numberingXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:abstractNum w:abstractNumId="0">
    <w:multiLevelType w:val="hybridMultilevel"/>
    <w:lvl w:ilvl="0">
      <w:start w:val="1"/>
      <w:numFmt w:val="bullet"/>
      <w:lvlText w:val="&#x2022;"/>
      <w:lvlJc w:val="left"/>
      <w:pPr><w:ind w:left="720" w:hanging="360"/></w:pPr>
      <w:rPr><w:rFonts w:ascii="Symbol" w:hAnsi="Symbol"/><w:sz w:val="22"/></w:rPr>
    </w:lvl>
  </w:abstractNum>
  <w:num w:numId="1">
    <w:abstractNumId w:val="0"/>
  </w:num>
</w:numbering>`;

  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
  <Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/>
</Types>`;

  const rootRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  // Pack ZIP
  const zip = new JSZip();
  zip.file('[Content_Types].xml', contentTypesXml);
  zip.file('_rels/.rels', rootRelsXml);
  zip.file('word/document.xml', documentXml);
  zip.file('word/styles.xml', stylesXml);
  zip.file('word/numbering.xml', numberingXml);
  zip.file('word/_rels/document.xml.rels', relsXml);

  const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${a.mcId || 'MC'}_analyse.docx`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
